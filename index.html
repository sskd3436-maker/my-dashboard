<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>현장 업무수행 대시보드</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', -apple-system, sans-serif; background: #f0f2f5; color: #1a1a2e; display: flex; min-height: 100vh; }

    /* 사이드바 */
    .sidebar {
      width: 230px; background: #1a1a2e; color: white;
      position: fixed; top: 0; left: 0; bottom: 0; z-index: 200;
      display: flex; flex-direction: column; transition: transform 0.3s;
      overflow-y: auto;
    }
    .sidebar-header { padding: 20px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 15px; font-weight: 700; }
    .sidebar-menu { flex: 1; padding: 8px 0; }
    .menu-group { margin-bottom: 4px; }
    .menu-group-title {
      padding: 10px 20px; font-size: 11px; color: rgba(255,255,255,0.35);
      text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700;
    }
    .menu-item {
      padding: 11px 20px; cursor: pointer; font-size: 14px;
      color: rgba(255,255,255,0.65); display: flex; align-items: center; gap: 10px;
      border-left: 3px solid transparent; transition: all 0.15s;
    }
    .menu-item:hover { background: rgba(255,255,255,0.07); color: white; }
    .menu-item.active { background: rgba(26,115,232,0.2); color: #5b9cf6; border-left-color: #5b9cf6; }
    .menu-item .icon { font-size: 16px; width: 22px; text-align: center; }

    .mobile-header {
      display: none; background: #1a1a2e; color: white; padding: 14px 16px;
      position: fixed; top: 0; left: 0; right: 0; z-index: 150; align-items: center; gap: 12px;
    }
    .hamburger { font-size: 22px; cursor: pointer; background: none; border: none; color: white; }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 190; }
    .overlay.show { display: block; }

    /* 메인 */
    .main { margin-left: 230px; flex: 1; min-height: 100vh; }
    .top-bar {
      background: white; padding: 16px 24px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 1px solid #e0e0e0; position: sticky; top: 0; z-index: 100;
    }
    .top-bar h1 { font-size: 18px; color: #333; }
    .refresh-btn { background: #1a73e8; border: none; color: white; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; }
    .content { padding: 24px; max-width: 1200px; }
    .page { display: none; }
    .page.active { display: block; }

    /* 보고서 헤더 */
    .report-header {
      background: white; border-radius: 12px; padding: 20px 24px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 20px;
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
    }
    .report-header h2 { font-size: 20px; }
    .report-nav { display: flex; gap: 8px; align-items: center; }
    .nav-btn { padding: 8px 14px; border: 1px solid #ddd; border-radius: 8px; background: white; cursor: pointer; font-size: 13px; }
    .nav-btn:hover { background: #f0f0f0; }
    .report-date { font-size: 16px; font-weight: 600; color: #1a73e8; min-width: 160px; text-align: center; }

    /* 탭 (통계관리 내부) */
    .sub-tabs {
      display: flex; gap: 4px; background: white; padding: 6px;
      border-radius: 10px; margin-bottom: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .sub-tab {
      padding: 10px 20px; border: none; background: transparent; border-radius: 8px;
      cursor: pointer; font-size: 14px; color: #666; font-weight: 500;
    }
    .sub-tab:hover { background: #e8f0fe; color: #1a73e8; }
    .sub-tab.active { background: #1a73e8; color: white; }
    .sub-page { display: none; }
    .sub-page.active { display: block; }

    /* 통계 카드 */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }
    .stat-card {
      background: white; border-radius: 12px; padding: 18px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08); text-align: center;
      position: relative; overflow: hidden;
    }
    .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; }
    .stat-card.positive::before { background: #0d904f; }
    .stat-card.neutral::before { background: #f9ab00; }
    .stat-card.negative::before { background: #dc3545; }
    .stat-card.etc::before { background: #6c757d; }
    .stat-card.total::before { background: #1a73e8; }
    .stat-number { font-size: 32px; font-weight: 700; }
    .stat-card.positive .stat-number { color: #0d904f; }
    .stat-card.neutral .stat-number { color: #f9ab00; }
    .stat-card.negative .stat-number { color: #dc3545; }
    .stat-card.etc .stat-number { color: #6c757d; }
    .stat-card.total .stat-number { color: #1a73e8; }
    .stat-label { font-size: 13px; color: #666; margin-bottom: 4px; }
    .stat-percent { font-size: 12px; color: #999; }
    .stat-bar { margin-top: 8px; height: 5px; background: #eee; border-radius: 3px; overflow: hidden; }
    .stat-bar-fill { height: 100%; border-radius: 3px; }
    .stat-card.positive .stat-bar-fill { background: #0d904f; }
    .stat-card.neutral .stat-bar-fill { background: #f9ab00; }
    .stat-card.negative .stat-bar-fill { background: #dc3545; }
    .stat-card.etc .stat-bar-fill { background: #6c757d; }
    .stat-card.total .stat-bar-fill { background: #1a73e8; }

    .section-box { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 20px; }
    .section-box h3 { font-size: 16px; margin-bottom: 14px; color: #333; }
    .mgr-row { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f0f0; gap: 8px; flex-wrap: wrap; }
    .mgr-row:last-child { border-bottom: none; }
    .mgr-name { width: 90px; font-weight: 600; font-size: 13px; }
    .mini-badge { padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; color: white; }
    .mini-badge.pos { background: #0d904f; }
    .mini-badge.neu { background: #f9ab00; }
    .mini-badge.neg { background: #dc3545; }
    .mini-badge.etc2 { background: #6c757d; }

    /* 테이블 */
    .table-box { background: white; border-radius: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); overflow: hidden; margin-bottom: 20px; }
    .table-box .box-header { padding: 14px 20px; border-bottom: 1px solid #e0e0e0; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    .table-box .box-header h3 { font-size: 16px; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { background: #f8f9fa; padding: 11px 12px; text-align: left; font-weight: 600; color: #555; border-bottom: 2px solid #e0e0e0; white-space: nowrap; }
    td { padding: 9px 12px; border-bottom: 1px solid #f0f0f0; max-width: 260px; overflow: hidden; text-overflow: ellipsis; }
    tr:hover td { background: #f8f9ff; }
    td.editable { cursor: pointer; }
    td.editable:hover { background: #e8f0fe !important; }
    td.editing { padding: 4px; }
    td.editing input { width: 100%; padding: 7px; border: 2px solid #1a73e8; border-radius: 4px; font-size: 13px; outline: none; }

    .btn { padding: 9px 18px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; }
    .btn-blue { background: #1a73e8; color: white; }
    .btn-red { background: #dc3545; color: white; }
    .btn-gray { background: #f0f0f0; color: #333; }
    .btn-sm { padding: 5px 12px; font-size: 12px; }

    .badge { padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; color: white; display: inline-block; }
    .badge-pos { background: #0d904f; }
    .badge-neu { background: #f9ab00; color: #333; }
    .badge-neg { background: #dc3545; }
    .badge-etc { background: #6c757d; }
    .check-mark { display: inline-block; width: 24px; height: 24px; line-height: 24px; text-align: center; border-radius: 50%; font-weight: bold; font-size: 13px; }
    .check-pos { background: #d4edda; color: #0d904f; }
    .check-neu { background: #fff3cd; color: #856404; }
    .check-neg { background: #f8d7da; color: #dc3545; }
    .check-etc { background: #e2e3e5; color: #6c757d; }
    .highlight { background: #fff3cd; padding: 1px 2px; border-radius: 2px; }

    .search-bar { background: white; border-radius: 12px; padding: 14px 20px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .search-input { flex: 1; min-width: 180px; padding: 10px 14px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 15px; outline: none; }
    .search-input:focus { border-color: #1a73e8; }
    .filter-select { padding: 10px 14px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 14px; outline: none; background: white; }

    /* 캘린더 */
    .cal-mini { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 16px; }
    .cal-hd { text-align: center; font-size: 11px; font-weight: 600; color: #999; padding: 6px 0; }
    .cal-d { text-align: center; padding: 8px 2px; border-radius: 6px; cursor: pointer; font-size: 12px; min-height: 44px; }
    .cal-d:hover { background: #e8f0fe; }
    .cal-d.today { border: 2px solid #1a73e8; }
    .cal-d.selected { background: #1a73e8; color: white; }
    .cal-d.has-data { background: #f0f7ff; }
    .cal-d.selected.has-data { background: #1a73e8; }
    .cal-d .dn { font-weight: 600; }
    .cal-d .dc { font-size: 9px; color: #1a73e8; }
    .cal-d.selected .dc { color: white; }
    .cal-d.other { color: #ccc; }

    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 300; justify-content: center; align-items: center; }
    .modal-bg.show { display: flex; }
    .modal { background: white; border-radius: 16px; padding: 28px; width: 90%; max-width: 650px; max-height: 85vh; overflow-y: auto; }
    .modal h2 { margin-bottom: 20px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; margin-bottom: 5px; font-size: 13px; color: #555; font-weight: 500; }
    .field input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; outline: none; }
    .modal-btns { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .detail-item { padding: 12px; background: #f8f9fa; border-radius: 8px; }
    .detail-item label { font-size: 11px; color: #999; display: block; margin-bottom: 4px; }
    .detail-item .val { font-size: 14px; color: #333; word-break: break-all; }
    .detail-full { grid-column: 1 / -1; }

    .loading { text-align: center; padding: 40px; color: #999; }
    .spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid #ddd; border-top-color: #1a73e8; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .toast-box { position: fixed; top: 20px; right: 20px; z-index: 400; }
    .toast { padding: 12px 20px; border-radius: 8px; color: white; font-size: 14px; margin-bottom: 8px; animation: slideIn 0.3s; }
    .toast.ok { background: #0d904f; }
    .toast.fail { background: #dc3545; }
    .toast.info { background: #1a73e8; }
    @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    .empty-msg { text-align: center; padding: 30px; color: #999; }

    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .mobile-header { display: flex; }
      .main { margin-left: 0; padding-top: 52px; }
      .content { padding: 12px; }
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .detail-grid { grid-template-columns: 1fr; }
      .stat-number { font-size: 24px; }
      .sub-tabs { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<div class="mobile-header">
  <button class="hamburger" onclick="toggleSidebar()">☰</button>
  <span style="font-size:16px;font-weight:600;">📊 업무수행 대시보드</span>
</div>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

<!-- 사이드바 -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">📊 업무수행 대시보드</div>
  <div class="sidebar-menu">
    <div class="menu-group">
      <div class="menu-group-title">영업활동관리</div>
      <div class="menu-item active" onclick="goPage('activity',this)"><span class="icon">📋</span> 영업활동 조회</div>
      <div id="sheetMenus"></div>
    </div>
    <div class="menu-group">
      <div class="menu-group-title">통계관리</div>
      <div class="menu-item" onclick="goPage('stats',this)"><span class="icon">📊</span> 현황 통계</div>
    </div>
  </div>
</div>

<!-- 메인 -->
<div class="main">
  <div class="top-bar">
    <h1 id="pageTitle">📋 영업활동 조회</h1>
    <button class="refresh-btn" onclick="init()">🔄 새로고침</button>
  </div>
  <div class="content">

    <!-- ========== 영업활동 조회 ========== -->
    <div class="page active" id="page-activity">
      <div class="search-bar">
        <input type="text" class="search-input" id="actSearch" placeholder="🔍 사이트명, 담당자, 내용 검색..." oninput="renderActivity()">
        <select class="filter-select" id="actSent" onchange="renderActivity()">
          <option value="">전체 감정</option><option value="긍정">긍정</option><option value="중립">중립</option><option value="부정">부정</option><option value="기타">기타(재계약)</option>
        </select>
        <select class="filter-select" id="actMgr" onchange="renderActivity()"><option value="">전체 담당자</option></select>
        <select class="filter-select" id="actSheet" onchange="renderActivity()"><option value="">전체 시트</option></select>
      </div>
      <div class="stats-grid" id="actStats"></div>
      <div class="table-box">
        <div class="box-header"><h3 id="actTitle">영업활동 목록</h3></div>
        <div class="table-wrap"><table><thead id="actTH"></thead><tbody id="actTB"></tbody></table></div>
      </div>
    </div>


    <!-- ========== 시트 데이터 ========== -->
    <div class="page" id="page-sheet">
      <div class="search-bar">
        <input type="text" class="search-input" id="sheetSearch" placeholder="🔍 검색..." oninput="filterSheet()">
        <button class="btn btn-blue" onclick="openAddModal()">+ 행 추가</button>
      </div>
      <div class="table-box">
        <div class="box-header"><h3 id="sheetDataTitle">시트</h3></div>
        <div class="table-wrap"><table><thead id="sTH"></thead><tbody id="sTB"></tbody></table></div>
      </div>
    </div>

    <!-- ========== 통계관리 ========== -->
    <div class="page" id="page-stats">
      <div class="sub-tabs">
        <button class="sub-tab active" onclick="goSubTab('all',this)">전체 현황</button>
        <button class="sub-tab" onclick="goSubTab('daily',this)">일일 보고</button>
        <button class="sub-tab" onclick="goSubTab('weekly',this)">주간 보고</button>
        <button class="sub-tab" onclick="goSubTab('monthly',this)">월간 보고</button>
        <button class="sub-tab" onclick="goSubTab('manager',this)">담당자별</button>
      </div>

      <!-- 전체 현황 -->
      <div class="sub-page active" id="sub-all">
        <div class="stats-grid" id="allStats"></div>
        <div class="section-box"><h3>👤 담당자별 현황</h3><div id="allMgr"></div></div>
        <div class="section-box"><h3>📄 시트별 현황</h3><div id="allSheet"></div></div>
        <div class="table-box">
          <div class="box-header"><h3 id="allTableTitle">전체 목록</h3></div>
          <div class="table-wrap"><table><thead id="allTH"></thead><tbody id="allTB"></tbody></table></div>
        </div>
      </div>

      <!-- 일일 보고 -->
      <div class="sub-page" id="sub-daily">
        <div class="report-header">
          <h2>일일 보고서</h2>
          <div class="report-nav">
            <button class="nav-btn" onclick="moveDaily(-1)">◀ 전날</button>
            <div class="report-date" id="dailyDate"></div>
            <button class="nav-btn" onclick="moveDaily(1)">다음날 ▶</button>
            <button class="nav-btn" onclick="moveDaily(0)" style="margin-left:8px;">오늘</button>
          </div>
        </div>
        <div class="stats-grid" id="dailyStats"></div>
        <div class="section-box"><h3>👤 담당자별</h3><div id="dailyMgr"></div></div>
        <div class="table-box">
          <div class="box-header"><h3 id="dailyTT">방문 목록</h3></div>
          <div class="table-wrap"><table><thead id="dailyTH"></thead><tbody id="dailyTB"></tbody></table></div>
        </div>
      </div>

      <!-- 주간 보고 -->
      <div class="sub-page" id="sub-weekly">
        <div class="report-header">
          <h2>주간 보고서</h2>
          <div class="report-nav">
            <button class="nav-btn" onclick="moveWeekly(-1)">◀ 전주</button>
            <div class="report-date" id="weeklyDate"></div>
            <button class="nav-btn" onclick="moveWeekly(1)">다음주 ▶</button>
            <button class="nav-btn" onclick="moveWeekly(0)" style="margin-left:8px;">이번주</button>
          </div>
        </div>
        <div class="stats-grid" id="weeklyStats"></div>
        <div class="section-box"><h3>👤 담당자별</h3><div id="weeklyMgr"></div></div>
        <div class="section-box"><h3>📊 일별 현황</h3><div id="weeklyDaily"></div></div>
        <div class="table-box">
          <div class="box-header"><h3 id="weeklyTT">방문 목록</h3></div>
          <div class="table-wrap"><table><thead id="weeklyTH"></thead><tbody id="weeklyTB"></tbody></table></div>
        </div>
      </div>

      <!-- 월간 보고 -->
      <div class="sub-page" id="sub-monthly">
        <div class="report-header">
          <h2>월간 보고서</h2>
          <div class="report-nav">
            <button class="nav-btn" onclick="moveMonthly(-1)">◀ 전월</button>
            <div class="report-date" id="monthlyDate"></div>
            <button class="nav-btn" onclick="moveMonthly(1)">다음월 ▶</button>
            <button class="nav-btn" onclick="moveMonthly(0)" style="margin-left:8px;">이번달</button>
          </div>
        </div>
        <div class="stats-grid" id="monthlyStats"></div>
        <div class="section-box"><h3>👤 담당자별</h3><div id="monthlyMgr"></div></div>
        <div class="section-box"><h3>📅 캘린더</h3><div class="cal-mini" id="monthlyCal"></div></div>
        <div class="section-box"><h3>📊 주별 현황</h3><div id="monthlyWeekly"></div></div>
        <div class="table-box">
          <div class="box-header"><h3 id="monthlyTT">방문 목록</h3></div>
          <div class="table-wrap"><table><thead id="monthlyTH"></thead><tbody id="monthlyTB"></tbody></table></div>
        </div>
      </div>

      <!-- 담당자별 -->
      <div class="sub-page" id="sub-manager">
        <div class="stats-grid" id="mgrAllStats"></div>
        <div id="mgrDetailArea"></div>
      </div>

    </div><!-- /page-stats -->

  </div>
</div>

<div class="toast-box" id="toasts"></div>
<div class="modal-bg" id="addModal"><div class="modal"><h2>새 행 추가</h2><div id="addFields"></div><div class="modal-btns"><button class="btn btn-gray" onclick="closeModal('addModal')">취소</button><button class="btn btn-blue" onclick="submitAdd()">추가</button></div></div></div>
<div class="modal-bg" id="detailModal"><div class="modal"><h2 id="detailTitle">상세</h2><div class="detail-grid" id="detailGrid"></div><div class="modal-btns"><button class="btn btn-gray" onclick="closeModal('detailModal')">닫기</button></div></div></div>

<script>
var API = 'https://script.google.com/macros/s/AKfycbxHgqcHzORBcUYMG0mFLSB93iuqMdvpe5WPLGbLpZexA82e36TBegFF_he1C9JgiMcZIg/exec';

var allSheetsData={},allFlat=[],dataLoaded=false;
var nowSheet=null,sheetHeaders=[],sheetRows=[],sheetFiltered=[],sheetStartCol=2;
var dailyDt,weekStart,mYear,mMon;
var curPage='activity',curSubTab='all';

function init(){
  dataLoaded=false;allSheetsData={};allFlat=[];
  var n=new Date();n.setHours(0,0,0,0);
  dailyDt=new Date(n);setWeekStart(n);mYear=n.getFullYear();mMon=n.getMonth();
  curPage='activity';

  // 로딩 표시
  document.getElementById('actStats').innerHTML='<div class="loading"><div class="spinner"></div></div>';
  document.getElementById('actTB').innerHTML='<tr><td colspan="8"><div class="loading"><div class="spinner"></div> 데이터 불러오는 중...</div></td></tr>';

function sentBadge(t){if(!t)return'';var l={positive:'긍정',neutral:'중립',negative:'부정',etc:'기타'},c={positive:'badge-pos',neutral:'badge-neu',negative:'badge-neg',etc:'badge-etc'};return'<span class="badge '+c[t]+'">'+l[t]+'</span>';}
function renderCell(h,v){var s=String(v||'').trim(),sc=(h==='긍정'||h==='중립'||h==='중림'||h==='부정'||h==='재계약');if(sc){if(isChecked(s)){if(h==='긍정')return'<span class="check-mark check-pos">O</span>';if(h==='중립'||h==='중림')return'<span class="check-mark check-neu">O</span>';if(h==='부정')return'<span class="check-mark check-neg">O</span>';if(h==='재계약')return'<span class="check-mark check-etc">O</span>';}return'';}return esc(v!==undefined&&v!==null?String(v):'');}
function parseDate(v){if(!v)return null;if(v instanceof Date){var d=new Date(v);d.setHours(0,0,0,0);return d;}var s=String(v).trim(),m=s.match(/(\d{4})[-\/.](\d{1,2})[-\/.](\d{1,2})/);if(m)return new Date(parseInt(m[1]),parseInt(m[2])-1,parseInt(m[3]));var d=new Date(s);if(!isNaN(d.getTime())){d.setHours(0,0,0,0);return d;}return null;}
function fmt(d){if(!d)return'';return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

// ===== 공용 HTML 생성 =====
function mkStats(list){
  var t={positive:0,neutral:0,negative:0,etc:0,all:0};
  for(var i=0;i<list.length;i++){var s=list[i].sent;if(s){t[s]++;t.all++;}}
  var items=[{k:'all',l:'전체',c:'total'},{k:'positive',l:'긍정',c:'positive'},{k:'neutral',l:'중립',c:'neutral'},{k:'negative',l:'부정',c:'negative'},{k:'etc',l:'기타',c:'etc'}];
  var h='';for(var i=0;i<items.length;i++){var it=items[i],cn=t[it.k],p=t.all>0?Math.round(cn/t.all*100):0;if(it.k==='all')p=100;
    h+='<div class="stat-card '+it.c+'"><div class="stat-label">'+it.l+'</div><div class="stat-number">'+cn+'</div><div class="stat-percent">'+p+'%</div><div class="stat-bar"><div class="stat-bar-fill" style="width:'+p+'%"></div></div></div>';}
  return h;
}
function mkMgr(list){
  var ms={};for(var i=0;i<list.length;i++){var m=list[i].mgr||'미지정';if(!ms[m])ms[m]={positive:0,neutral:0,negative:0,etc:0,total:0};ms[m].total++;var s=list[i].sent;if(s)ms[m][s]++;}

    h+='<div class="mgr-row"><div class="mgr-name">'+esc(n)+'</div><span class="mini-badge pos">긍정 '+c.positive+'</span><span class="mini-badge neu">중립 '+c.neutral+'</span><span class="mini-badge neg">부정 '+c.negative+'</span><span class="mini-badge etc2">기타 '+c.etc+'</span><span style="font-size:11px;color:#999;">('+c.total+')</span></div>';}
  return h||'<div class="empty-msg">데이터 없음</div>';
}

function renderMonthly(){
  document.getElementById('monthlyDate').textContent=mYear+'년 '+(mMon+1)+'월';

  var ch='',dn=['일','월','화','수','목','금','토'];
  for(var i=0;i<7;i++)ch+='<div class="cal-hd">'+dn[i]+'</div>';
  var sd=first.getDay(),td2=last.getDate(),today=new Date();today.setHours(0,0,0,0);
  var pl=new Date(mYear,mMon,0).getDate();
  for(var i=sd-1;i>=0;i--)ch+='<div class="cal-d other"><div class="dn">'+(pl-i)+'</div></div>';
  for(var d=1;d<=td2;d++){var dt=new Date(mYear,mMon,d),k=fmt(dt),cnt=dc[k]||0;
    var cls='cal-d';if(dt.getTime()===today.getTime())cls+=' today';if(cnt>0)cls+=' has-data';
    ch+='<div class="'+cls+'" onclick="dailyDt=new Date('+mYear+','+mMon+','+d+');goSubTab(\'daily\',document.querySelectorAll(\'.sub-tab\')[1])"><div class="dn">'+d+'</div>';
    if(cnt>0)ch+='<div class="dc">'+cnt+'건</div>';ch+='</div>';}
  document.getElementById('monthlyCal').innerHTML=ch;
  // 주별
  var wh='',wn=1,ws=new Date(first);
  while(ws<=last){var we=new Date(ws);we.setDate(ws.getDate()+6);if(we>last)we=new Date(last);
    var wl=filterByDate(ws,we);var wc={positive:0,neutral:0,negative:0,etc:0};for(var j=0;j<wl.length;j++){var s=wl[j].sent;if(s)wc[s]++;}
    wh+='<div class="mgr-row"><div class="mgr-name">'+wn+'주차</div><span style="font-size:11px;color:#666;">'+fmt(ws).slice(5)+'~'+fmt(we).slice(5)+'</span> <span class="mini-badge pos">긍정 '+wc.positive+'</span><span class="mini-badge neu">중립 '+wc.neutral+'</span><span class="mini-badge neg">부정 '+wc.negative+'</span><span class="mini-badge etc2">기타 '+wc.etc+'</span><span style="font-size:11px;color:#999;">('+wl.length+')</span></div>';
    ws=new Date(we);ws.setDate(ws.getDate()+1);wn++;}
  document.getElementById('monthlyWeekly').innerHTML=wh;
  mkTable(list,'monthlyTH','monthlyTB','monthly');
}

      bb+='<td class="editable" ondblclick="editCell(this,\''+nowSheet+'\','+row._rowIndex+','+cn+',\''+esc(h)+'\')">'+ renderCell(h,row[h])+'</td>';}
    bb+='<td><button class="btn btn-gray btn-sm" onclick="showSheetDet('+i+')">보기</button></td>';
    bb+='<td><button class="btn btn-red btn-sm" onclick="delRow(\''+nowSheet+'\','+row._rowIndex+')">삭제</button></td></tr>';}
  if(!list.length)bb='<tr><td colspan="'+(sheetHeaders.length+3)+'"><div class="empty-msg">데이터 없음</div></td></tr>';
  document.getElementById('sTB').innerHTML=bb;
}
function filterSheet(){var q=(document.getElementById('sheetSearch').value||'').toLowerCase().trim();if(!q){drawSheet(sheetRows);return;}
  var r=[];for(var i=0;i<sheetRows.length;i++){var row=sheetRows[i],f=false;for(var j=0;j<sheetHeaders.length;j++)if(String(row[sheetHeaders[j]]||'').toLowerCase().indexOf(q)>=0){f=true;break;}if(f)r.push(row);}sheetFiltered=r;drawSheet(r);}
function showSheetDet(idx){var list=sheetFiltered.length?sheetFiltered:sheetRows;var row=list[idx];if(!row)return;
  document.getElementById('detailTitle').textContent='상세 #'+(idx+1);var h='';
  for(var i=0;i<sheetHeaders.length;i++){var v=row[sheetHeaders[i]]!==undefined?row[sheetHeaders[i]]:'',lo=String(v).length>40;
    h+='<div class="detail-item'+(lo?' detail-full':'')+'"><label>'+esc(sheetHeaders[i])+'</label><div class="val">'+renderCell(sheetHeaders[i],v)+'</div></div>';}
  document.getElementById('detailGrid').innerHTML=h;document.getElementById('detailModal').classList.add('show');}
function editCell(td,sheet,row,col,header){if(td.classList.contains('editing'))return;var old=td.textContent;td.classList.add('editing');td.innerHTML='<input type="text" value="'+esc(old)+'">';var inp=td.querySelector('input');inp.focus();inp.select();
  function save(){var val=inp.value;td.classList.remove('editing');td.innerHTML=renderCell(header,val);if(val!==old)apiPost({action:'updateCell',sheet:sheet,row:row,col:col,value:val},function(r){if(r.success){toast('수정!','ok');for(var i=0;i<sheetRows.length;i++)if(sheetRows[i]._rowIndex===row){sheetRows[i][header]=val;break;}}else toast('실패','fail');});}
  inp.onblur=save;inp.onkeydown=function(e){if(e.key==='Enter')inp.blur();if(e.key==='Escape'){td.classList.remove('editing');td.innerHTML=renderCell(header,old);}};}
function openAddModal(){var f=document.getElementById('addFields');f.innerHTML='';for(var i=0;i<sheetHeaders.length;i++)f.innerHTML+='<div class="field"><label>'+esc(sheetHeaders[i])+'</label><input type="text" id="af_'+i+'" placeholder="'+esc(sheetHeaders[i])+'"></div>';document.getElementById('addModal').classList.add('show');}
function closeModal(id){document.getElementById(id).classList.remove('show');}
function submitAdd(){var d=[];for(var i=0;i<sheetHeaders.length;i++)d.push(document.getElementById('af_'+i).value);apiPost({action:'addRow',sheet:nowSheet,rowData:d},function(r){if(r.success){toast('추가!','ok');closeModal('addModal');delete allSheetsData[nowSheet];buildFlat();loadSheetPage(nowSheet);}else toast('실패','fail');});}
function delRow(sheet,row){if(!confirm('삭제?'))return;apiPost({action:'deleteRow',sheet:sheet,row:row},function(r){if(r.success){toast('삭제!','ok');delete allSheetsData[nowSheet];buildFlat();loadSheetPage(nowSheet);}else toast('실패','fail');});}

window.onload=init;
</script>
</body>
</html>
